services:
  app:
    build: .
    container_name: whatsapp-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
      - VITE_SUPABASE_PROJECT_ID=${VITE_SUPABASE_PROJECT_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    networks:
      - whatsmarketing
    labels:
      - "traefik.enable=true"
      
      # Configuração do Roteador (Router)
      - "traefik.http.routers.whatsmarketing-router.rule=Host(`whats.legio13.cloud`)"
      - "traefik.http.routers.whatsmarketing-router.entrypoints=websecure"
      - "traefik.http.routers.whatsmarketing-router.tls=true"
      - "traefik.http.routers.whatsmarketing-router.service=whatsmarketing-service"
      
      # Configuração do Serviço Interno (Service)
      - "traefik.http.services.whatsmarketing-service.loadbalancer.server.port=3000"
      - "traefik.http.services.whatsmarketing-service.loadbalancer.server.scheme=http"
      
      # Forçar a rede correta de comunicação
      - "traefik.docker.network=whatsmarketing"

networks:
  whatsmarketing:
    external: true
