services:
  app:
    build: .
    container_name: whatsapp-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      # Supabase (Lovable Cloud) — preencha no seu .env da VPS
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
      VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

    networks:
      - traefik-public

    labels:
      - "traefik.enable=true"
      # 👇 ALCONTEÇA AQUI: Coloque o seu subdomínio correto configurado na Hostinger
      - "traefik.http.routers.whatsmarketing.rule=Host(`whats.legio13.cloud`)"
      - "traefik.http.routers.whatsmarketing.entrypoints=websecure"
      # 👇 ALCONTEÇA AQUI: Certifique-se de que o nome do seu resolver do Traefik é 'letsencrypt'
      - "traefik.http.routers.whatsmarketing.tls.certresolver=letsencrypt"
      - "traefik.http.services.whatsmarketing.loadbalancer.server.port=3000"

    networks:
      traefik-public:
        external: true
    env_file:
      - .env
   
