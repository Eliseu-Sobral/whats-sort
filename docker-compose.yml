services:
  app:
    build: .
    container_name: whatsapp-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
      - VITE_SUPABASE_PROJECT_ID=${VITE_SUPABASE_PROJECT_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    networks:
      - whatsmarketing
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whatsmarketing.rule=Host(`whats.legio13.cloud`)"
      - "traefik.http.routers.whatsmarketing.entrypoints=websecure"
      # 👇 Alterado para 'le' (padrão extremamente comum que substitui o 'letsencrypt')
      - "traefik.http.routers.whatsmarketing.tls.certresolver=le"
      - "traefik.docker.network=whatsmarketing"
      - "traefik.http.services.whatsmarketing.loadbalancer.server.port=3000"

networks:
  whatsmarketing:
    external: true

   
